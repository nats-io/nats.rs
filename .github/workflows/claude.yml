name: Claude Code

# GITHUB_TOKEN is neutered — all GitHub API access uses the App token instead.
permissions: {}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v2
    with:
      gh_app_id: ${{ vars.CLAUDE_GH_APP_ID }}
      checkout_mode: "base"
      review_focus: |
        Additionally focus on:
        - Safety issues (unsafe code, panics, unwraps in non-test code)
        - API design consistency with the rest of the crate
        - Correct async/await patterns (missing .await, blocking in async context, proper cancellation safety)
        - Rust idioms and best practices
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
      gh_app_private_key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}
