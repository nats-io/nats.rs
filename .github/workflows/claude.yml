name: Claude Code

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v1
    with:
      review_focus: |
        Additionally focus on:
        - Safety issues (unsafe code, panics, unwraps in non-test code)
        - API design consistency with the rest of the crate
        - Correct async/await patterns (missing .await, blocking in async context, proper cancellation safety)
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
